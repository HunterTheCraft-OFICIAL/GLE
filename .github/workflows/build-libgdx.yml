name: 🎮 Build LibGDX Road MVP

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Permite executar manualmente
    inputs:
      debug_mode:
        description: 'Ativar upload de artefatos de debug (engine, content, shared)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 📊 Check Disk Space (Initial)
        run: |
          echo "=== DISK SPACE CHECK (Initial) ==="
          df -h
          echo "=============================="

      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🗑️ Remove 'analisar-remover' directory (Safety Clean)
        run: |
          if [ -d "analisar-remover" ]; then
            echo "⚠️ Found 'analisar-remover' directory. Removing for safety..."
            rm -rf analisar-remover
            echo "✅ Directory removed successfully."
          else
            echo "ℹ️ 'analisar-remover' directory not found. Skipping removal."
          fi

      - name: 🧹 Clean Build Directory
        run: ./gradlew --no-daemon clean

      - name: 📊 Check Disk Space (After Clean)
        run: |
          echo "=== DISK SPACE CHECK (After Clean) ==="
          df -h
          echo "====================================="

      - name: 📦 Download Dependencies & Build
        run: ./gradlew --no-daemon build

      - name: 📊 Check Disk Space (After Build)
        run: |
          echo "=== DISK SPACE CHECK (After Build) ==="
          df -h
          echo "====================================="

      - name: 🏗️ Build Desktop JAR
        run: ./gradlew --no-daemon desktop:jar

      - name: 📤 Upload Desktop JAR
        uses: actions/upload-artifact@v4
        with:
          name: road-mvp-desktop
          path: desktop/build/libs/*.jar
          retention-days: 30

      - name: 📱 Build Android APK (Debug)
        run: ./gradlew --no-daemon android:assembleDebug

      - name: 📤 Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: road-mvp-android-debug
          path: android/build/outputs/apk/debug/*.apk
          retention-days: 30

      # --- Caixa de Inspeção (Debug Artifacts) ---
      # Upload de pastas críticas apenas em caso de falha ou via trigger manual com debug
      - name: 🕵️ Upload Engine Sources (Debug)
        if: failure() || (github.event_name == 'workflow_dispatch' && github.event.inputs.debug_mode == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: debug-engine-sources
          path: src/commonMain/kotlin/engine/
          retention-days: 5
          if-no-files-found: ignore

      - name: 🕵️ Upload Content Assets (Debug)
        if: failure() || (github.event_name == 'workflow_dispatch' && github.event.inputs.debug_mode == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: debug-content-assets
          path: assets/
          retention-days: 5
          if-no-files-found: ignore

      - name: 🕵️ Upload Shared Modules (Debug)
        if: failure() || (github.event_name == 'workflow_dispatch' && github.event.inputs.debug_mode == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: debug-shared-modules
          path: src/commonMain/kotlin/shared/
          retention-days: 5
          if-no-files-found: ignore
      
      - name: 📋 Upload Full Build Logs (Debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-build-logs
          path: |
            build/reports/
            build/test-results/
          retention-days: 5
          if-no-files-found: ignore

      - name: ✅ Build Summary
        run: |
          echo "## 🎉 Build Concluído com Sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Projeto:** LibGDX Kotlin Road MVP (Multi-módulo)" >> $GITHUB_STEP_SUMMARY
          echo "**Java Version:** 17" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:** road-mvp-desktop.jar + road-mvp-android-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Arquivos Gerados:" >> $GITHUB_STEP_SUMMARY
          echo "#### Desktop JAR:" >> $GITHUB_STEP_SUMMARY
          ls -lh desktop/build/libs/*.jar >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Nenhum JAR encontrado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Android APK:" >> $GITHUB_STEP_SUMMARY
          ls -lh android/build/outputs/apk/debug/*.apk >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Nenhum APK encontrado" >> $GITHUB_STEP_SUMMARY
          
          # Adiciona nota sobre debug se aplicável
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.debug_mode }}" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Modo Debug Ativado:** Artefatos de inspeção gerados." >> $GITHUB_STEP_SUMMARY
          fi
